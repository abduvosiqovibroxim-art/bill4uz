services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: !override
      - ./apps/api/.env.production
    environment: !override
      NODE_ENV: production
      PORT: 4000
      REQUIRE_PRODUCTION_CONFIG: "true"
      TRUST_PROXY: "true"
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL}
        INTERNAL_API_URL: ${INTERNAL_API_URL:?set INTERNAL_API_URL}
    environment: !override
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?set NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL}
      INTERNAL_API_URL: ${INTERNAL_API_URL:?set INTERNAL_API_URL}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    env_file: !override
      - ./apps/bot/.env.production
    environment: !override
      NODE_ENV: production
      REQUIRE_PRODUCTION_CONFIG: "true"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "4100:4100"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4100/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20
