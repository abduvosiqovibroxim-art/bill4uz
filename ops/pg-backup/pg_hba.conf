# Custom pg_hba.conf for Billuz.
# Same as the stock image rules, PLUS a replication line so the backup
# sidecar (billiard_backup) can run pg_basebackup over the network.
#
# TYPE  DATABASE        USER            ADDRESS                 METHOD

# In-container admin access over the unix socket (docker exec psql, healthcheck).
local   all             all                                     trust

# Application + tooling connections (api, sidecar pg_dump) authenticate by password.
host    all             all             all                     scram-sha-256

# Physical base backups (pg_basebackup) from the sidecar use the replication protocol.
host    replication     all             all                     scram-sha-256
