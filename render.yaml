services:
  - type: web
    name: billiard-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run prisma:generate -w apps/api && npm run build -w apps/api
    startCommand: npm run prisma:migrate:deploy -w apps/api && npm run prisma:seed -w apps/api && npm run start -w apps/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: billiard-db
          property: connectionString
      - key: BOT_INTERNAL_SECRET
        generateValue: true
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: JWT_REFRESH_COOKIE_NAME
        value: billard_refresh
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: EMAIL_VERIFICATION_EXPIRES_IN
        value: 1d
      - key: PASSWORD_RESET_EXPIRES_IN
        value: 1h
      - key: APP_URL
        sync: false
      - key: API_PUBLIC_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false

  - type: web
    name: billiard-bot
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run prisma:generate -w apps/api && npm run build -w apps/bot
    startCommand: npm run start -w apps/bot
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_PORT
        value: 10000
      - key: BOT_MODE
        value: polling
      - key: BOT_API_URL
        sync: false
      - key: BOT_INTERNAL_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_BOT_USERNAME
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false

databases:
  - name: billiard-db
    plan: free
    region: frankfurt
